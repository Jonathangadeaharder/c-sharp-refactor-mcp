name: Build, Test, and Log

on:
  push:
    branches:
      - '**'  # Run on all branches
  pull_request:
    branches:
      - main

permissions:
  contents: write  # Required to push commits

jobs:
  build-test-log:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for amending
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Create log file header
      run: |
        echo "================================================================" > build-test.log
        echo "Build and Test Execution Log" >> build-test.log
        echo "================================================================" >> build-test.log
        echo "Commit: ${{ github.sha }}" >> build-test.log
        echo "Branch: ${{ github.ref_name }}" >> build-test.log
        echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> build-test.log
        echo "Triggered by: ${{ github.event_name }}" >> build-test.log
        echo "Actor: ${{ github.actor }}" >> build-test.log
        echo "================================================================" >> build-test.log
        echo "" >> build-test.log

    - name: Restore dependencies
      run: |
        echo ">>> Restoring dependencies..." | tee -a build-test.log
        dotnet restore 2>&1 | tee -a build-test.log
        echo "" >> build-test.log

    - name: Build project
      run: |
        echo ">>> Building project..." | tee -a build-test.log
        dotnet build --no-restore --configuration Release 2>&1 | tee -a build-test.log
        BUILD_EXIT_CODE=${PIPESTATUS[0]}
        echo "" >> build-test.log
        echo "Build exit code: $BUILD_EXIT_CODE" >> build-test.log
        echo "" >> build-test.log

        if [ $BUILD_EXIT_CODE -ne 0 ]; then
          echo "❌ BUILD FAILED" >> build-test.log
        else
          echo "✅ BUILD SUCCEEDED" >> build-test.log
        fi
        echo "" >> build-test.log

        exit $BUILD_EXIT_CODE

    - name: Run tests
      if: success() || failure()  # Run even if build failed
      run: |
        echo ">>> Running tests..." | tee -a build-test.log
        dotnet test --no-build --configuration Release --verbosity normal --logger "console;verbosity=detailed" 2>&1 | tee -a build-test.log
        TEST_EXIT_CODE=${PIPESTATUS[0]}
        echo "" >> build-test.log
        echo "Test exit code: $TEST_EXIT_CODE" >> build-test.log
        echo "" >> build-test.log

        if [ $TEST_EXIT_CODE -ne 0 ]; then
          echo "❌ TESTS FAILED" >> build-test.log
        else
          echo "✅ TESTS PASSED" >> build-test.log
        fi
        echo "" >> build-test.log

        # Don't exit here - we want to commit the log even if tests fail

    - name: Add summary footer
      if: always()
      run: |
        echo "================================================================" >> build-test.log
        echo "End of Build and Test Log" >> build-test.log
        echo "Completed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> build-test.log
        echo "================================================================" >> build-test.log

    - name: Display log file
      if: always()
      run: |
        echo "📄 Log file contents:"
        cat build-test.log

    - name: Check if log changed
      if: always() && github.event_name == 'push'
      id: log_check
      run: |
        if [ -f build-test.log ]; then
          git add build-test.log
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Amend commit with log file
      if: always() && github.event_name == 'push' && steps.log_check.outputs.changed == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "GitHub Actions"

        # Add the log file
        git add build-test.log

        # Amend the commit
        git commit --amend --no-edit

        echo "✅ Commit amended with build-test.log"

    - name: Force push amended commit
      if: always() && github.event_name == 'push' && steps.log_check.outputs.changed == 'true'
      run: |
        # Force push the amended commit
        git push --force-with-lease origin ${{ github.ref_name }}

        echo "✅ Force pushed amended commit to ${{ github.ref_name }}"

    - name: Upload log as artifact (fallback)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-test-log
        path: build-test.log
        retention-days: 30

    - name: Final status
      if: always()
      run: |
        echo "================================================"
        echo "🎯 Workflow completed!"
        echo "📄 Log file has been:"
        if [ "${{ steps.log_check.outputs.changed }}" == "true" ] && [ "${{ github.event_name }}" == "push" ]; then
          echo "  ✅ Amended to commit ${{ github.sha }}"
          echo "  ✅ Force pushed to ${{ github.ref_name }}"
          echo ""
          echo "To view the log:"
          echo "  git pull --force"
          echo "  cat build-test.log"
        else
          echo "  📦 Uploaded as workflow artifact"
          echo ""
          echo "Reason: ${{ github.event_name == 'pull_request' && 'Pull request (no commit amendment)' || 'No changes to log file' }}"
        fi
        echo "================================================"

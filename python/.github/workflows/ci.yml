name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  DOTNET_VERSION: '8.0.x'

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: python
        run: |
          pip install -e ".[dev]"

      - name: Run Black
        working-directory: python
        run: |
          black --check src tests

      - name: Run Ruff
        working-directory: python
        run: |
          ruff check src tests

      - name: Run MyPy
        working-directory: python
        run: |
          mypy src
        continue-on-error: true  # Don't fail on type errors yet

  test-python:
    name: Test Python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: python
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: python
        run: |
          pytest -v --cov=refactor_mcp --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./python/.coverage
          flags: python-${{ matrix.os }}-${{ matrix.python-version }}
          name: python-${{ matrix.os }}-${{ matrix.python-version }}
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'

  build-roslyn-cli:
    name: Build Roslyn CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            runtime: linux-x64
          - os: macos-latest
            runtime: osx-x64
          - os: windows-latest
            runtime: win-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Roslyn CLI
        working-directory: python/roslyn_cli
        run: |
          dotnet build -c Release

      - name: Publish Roslyn CLI
        working-directory: python/roslyn_cli
        run: |
          dotnet publish -c Release -r ${{ matrix.runtime }} --self-contained -o bin

      - name: Test Roslyn CLI (Unix)
        if: runner.os != 'Windows'
        working-directory: python/roslyn_cli
        run: |
          echo '{"command":"version","parameters":{}}' | ./bin/roslyn-cli

      - name: Test Roslyn CLI (Windows)
        if: runner.os == 'Windows'
        working-directory: python/roslyn_cli
        shell: pwsh
        run: |
          echo '{"command":"version","parameters":{}}' | ./bin/roslyn-cli.exe

      - name: Upload Roslyn CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: roslyn-cli-${{ matrix.runtime }}
          path: python/roslyn_cli/bin/roslyn-cli*
          if-no-files-found: error

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-python, build-roslyn-cli]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Download Roslyn CLI
        uses: actions/download-artifact@v4
        with:
          name: roslyn-cli-linux-x64
          path: python/roslyn_cli/bin/

      - name: Make Roslyn CLI executable
        run: |
          chmod +x python/roslyn_cli/bin/roslyn-cli

      - name: Install dependencies
        working-directory: python
        run: |
          pip install -e ".[dev]"

      - name: Run integration tests
        working-directory: python
        run: |
          pytest tests/ -v -m integration
        continue-on-error: true  # Integration tests may require additional setup

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test-python, build-roslyn-cli]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: python
        run: |
          docker build -t refactor-mcp:test .

      - name: Test Docker image
        run: |
          docker run --rm refactor-mcp:test python -c "from refactor_mcp.config import Config; print('OK')"

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag refactor-mcp:test ghcr.io/${{ github.repository }}/refactor-mcp:latest
          docker push ghcr.io/${{ github.repository }}/refactor-mcp:latest

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test-python, build-roslyn-cli, integration-test, docker-build]
    if: failure()

    steps:
      - name: Send notification
        run: |
          echo "CI pipeline failed!"
          # Add notification logic here (Slack, email, etc.)
